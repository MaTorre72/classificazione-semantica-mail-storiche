database:
  path: data/email_cluster.sqlite

embedding:
  model_name: sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2
  chunk_size_chars: 2000
  chunk_overlap_chars: 200
  batch_size: 32

umap:
  n_neighbors: 15
  n_components: 5
  min_dist: 0.0
  metric: cosine
  random_state: 42

hdbscan:
  min_cluster_size: 5
  min_samples: 3
  metric: euclidean
  cluster_selection_method: leaf

clustering:
  active_profile: balanced
  profiles:
    conservative:
      umap: {n_neighbors: 15, n_components: 5, min_dist: 0.0, metric: cosine, random_state: 42}
      hdbscan: {min_cluster_size: 10, min_samples: 5, metric: euclidean, cluster_selection_method: eom}
    balanced:
      umap: {n_neighbors: 10, n_components: 5, min_dist: 0.0, metric: cosine, random_state: 42}
      hdbscan: {min_cluster_size: 6, min_samples: 3, metric: euclidean, cluster_selection_method: leaf}
    exploratory:
      umap: {n_neighbors: 8, n_components: 5, min_dist: 0.0, metric: cosine, random_state: 42}
      hdbscan: {min_cluster_size: 5, min_samples: 2, metric: euclidean, cluster_selection_method: leaf}
  normalize_embeddings: true
  min_cluster_size_absolute: 4
  max_noise_ratio_warning: 0.60
  max_largest_cluster_ratio_warning: 0.45
  min_clusters_warning: 3
  low_confidence_threshold: 0.5
  allowed_message_types: [operational_email]
  technical_stopwords:
    - buongiorno
    - buonasera
    - grazie
    - cordiali
    - saluti
    - allegato
    - allegata
    - invio
    - trasmetto
    - riferimento
    - comunicazione
    - richiesta
    - riscontro
    - informazioni
    - documento
    - documenti
    - mail
    - email
    - ciao
    - marco
    - mailto
    - com
    - https
    - tel
  sweep:
    n_neighbors: [5, 8, 10, 12, 15]
    n_components: [3, 5, 8]
    min_cluster_size: [4, 5, 6, 8, 10]
    min_samples: [2, 3, 5]
    max_combinations: 12

cleaning:
  version: v1.0.1
  min_semantic_chars: 80
  min_unique_words: 8
  max_semantic_chars: 12000
  exclude_message_types:
    - short_ack
    - auto_generated
    - pec_receipt
    - delivery_notification
    - calendar_message
    - newsletter
    - attachment_only
    - forward_only
    - low_information
  signature_patterns: []
  disclaimer_patterns: []
  quote_patterns: []
  automatic_patterns: []
