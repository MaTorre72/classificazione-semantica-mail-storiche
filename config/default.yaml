database:
  path: data/email_cluster.sqlite

embedding:
  model_name: sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2
  chunk_size_chars: 2000
  chunk_overlap_chars: 200
  batch_size: 32

umap:
  n_neighbors: 15
  n_components: 5
  min_dist: 0.0
  metric: cosine
  random_state: 42

hdbscan:
  min_cluster_size: 5
  min_samples: 3
  metric: euclidean
  cluster_selection_method: leaf

cleaning:
  version: v1.0.1
  min_semantic_chars: 80
  min_unique_words: 8
  max_semantic_chars: 12000
  exclude_message_types:
    - short_ack
    - auto_generated
    - pec_receipt
    - delivery_notification
    - calendar_message
    - newsletter
    - attachment_only
    - forward_only
    - low_information
  signature_patterns: []
  disclaimer_patterns: []
  quote_patterns: []
  automatic_patterns: []
