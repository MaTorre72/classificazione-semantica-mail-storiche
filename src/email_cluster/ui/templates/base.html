<!doctype html><html lang="it"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>{% block title %}Email Atlas{% endblock %}</title><style>
:root{--ink:#17212b;--muted:#5f6b72;--line:#d9e0e2;--paper:#fff;--soft:#f4f7f7;--teal:#087f75;--amber:#9a5d00;--red:#a13232}*{box-sizing:border-box}body{margin:0;font:15px system-ui;color:var(--ink);background:#eef2f2}a{color:var(--teal)}header{background:#14282a;color:#fff;padding:14px 24px;display:flex;align-items:center;justify-content:space-between}header strong{font-size:18px}nav{display:flex;gap:8px;flex-wrap:wrap}nav a{color:#dce9e8;text-decoration:none;padding:7px 9px}nav a:hover{background:#294143}main{max-width:1240px;margin:auto;padding:24px}.pagehead,.actions{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}.muted{color:var(--muted)}.grid{display:grid;gap:14px}.g2{grid-template-columns:repeat(2,minmax(0,1fr))}.g4{grid-template-columns:repeat(4,minmax(0,1fr))}.panel,.band{background:var(--paper);border:1px solid var(--line);padding:18px;margin:14px 0;border-radius:6px}.metric strong{font-size:28px;display:block}.metric span{color:var(--muted)}button,.btn{display:inline-block;border:1px solid #aab8ba;background:#fff;color:var(--ink);padding:9px 12px;border-radius:5px;text-decoration:none;cursor:pointer}.primary{background:var(--teal);border-color:var(--teal);color:#fff}button:disabled{opacity:.45;cursor:not-allowed}.badge{padding:4px 7px;background:var(--soft);border-radius:4px}.ok{color:var(--teal)}.warn,.notice{color:var(--amber)}.danger{border-color:#d8aaaa;background:#fff7f7;color:var(--red)}label{display:block;font-weight:600}input{width:100%;padding:9px;border:1px solid #aab8ba;margin-top:5px}.formrow{display:grid;grid-template-columns:2fr 1fr;gap:12px}.code{white-space:pre-wrap;background:#f1f4f4;padding:12px;overflow:auto}.table-wrap{overflow:auto}table{width:100%;border-collapse:collapse}th,td{text-align:left;padding:8px;border-bottom:1px solid var(--line);vertical-align:top}.study-section{scroll-margin-top:12px}.file-list{columns:2}.file-list li{margin:6px 0}@media(max-width:760px){.g2,.g4,.formrow{grid-template-columns:1fr}header{align-items:flex-start;gap:12px;flex-direction:column}.file-list{columns:1}}
</style></head><body><header><strong>Email Atlas · Studio Workbench</strong><nav><a href="/#prepare">Prepara Studio</a><a href="/#explore">Esplora Risultati</a><a href="/#orange">Esporta per Orange</a><a href="/#atlas">Costruisci Atlante</a><a href="/advanced">Avanzate / Legacy</a></nav></header><main>{% block content %}{% endblock %}</main><script>
async function api(url,body){const response=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body||{})});let data;try{data=await response.json()}catch{throw new Error('Risposta non leggibile dal server')}if(!response.ok){const detail=data.detail||{};const error=new Error(typeof detail==='string'?detail:(detail.message||'Operazione non riuscita'));error.detail=detail;throw error}return data}function toast(message){console.info(message)}
</script>{% block scripts %}{% endblock %}</body></html>
