name: codex-autonomous

on:
  workflow_dispatch:
  schedule:
    - cron: "17 */12 * * *"

permissions:
  contents: read

jobs:
  autonomous-cycle:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install project
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Prepare run folder
        run: mkdir -p .codex/runs/gha

      - name: Quality checks before Codex
        run: |
          chmod +x scripts/run_quality_checks.sh
          ./scripts/run_quality_checks.sh
        env:
          SKIP_SMOKE: "0"

      - name: Codex autonomous cycle
        uses: openai/codex-action@v1
        with:
          prompt_file: .codex/prompts/next_task.md
          sandbox: workspace-write

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: codex-autonomous-artifacts
          path: |
            .codex/runs/
            .codex/state/
